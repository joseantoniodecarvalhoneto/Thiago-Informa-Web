<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Thiago Informa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">

    <div class="mb-3">
        <img src="../Imagens/Logo_oficial.png" alt="Logo Thiago Informa" height="250" width="250">
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="wrapper p-4">
                    <form id="loginForm">
                        <h3 class="text-center mb-1">Login</h3>
                        <p class="text-center mb-4">Preencha os campos abaixo</p>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" id="email" class="form-control" placeholder="Usuário" required>
                        </div>

                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" id="senha" class="form-control" placeholder="Senha" required>
                        </div>

                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-login">Login</button>
                        </div>

                        <div class="text-center mt-3">
                            <a href="#" data-bs-toggle="modal" data-bs-target="#modalEsqueceuSenha">
                                Esqueceu a senha?
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEsqueceuSenha" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Recuperar senha</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Digite seu e-mail para recuperar a senha:</p>
                    <input type="email" id="emailRecuperacao" class="form-control" placeholder="Seu e-mail">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-login" id="btnRecuperar">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/login.js"></script>
</body>
</html>
